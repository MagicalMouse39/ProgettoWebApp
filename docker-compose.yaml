name: horsecare
services:
  revproxy:
    image: nginx:alpine
    ports:
      - 80:80
    depends_on:
      - postgrest
      - frontend
    volumes:
      - ./config/revproxy/default.conf:/etc/nginx/conf.d/default.conf:ro

  database:
    image: postgres:alpine
    restart: always
    ports:
      - 5432
    environment:
      POSTGRES_USER: ${PG_USER:-admin}
      POSTGRES_PASSWORD: ${PG_PASS:-password}
      POSTGRES_DB: ${PG_DB:-horsecare}
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "${PG_DB:-horsecare}", "-U", "${PG_USER:-admin}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql:rw
      - ./config/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  postgrest:
    image: postgrest/postgrest
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://${PG_USER:-admin}:${PG_PASS:-password}@database:5432/${PG_DB:-horsecare}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:3000
      PGRST_OPENAPI_MODE: ignore-privileges
      PGRST_DB_ANON_ROLE: anon
    depends_on:
      database:
        condition: service_healthy

  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "8081:8080"
    environment:
      API_URL: http://localhost:3000/

  frontend:
    image: progetto-webapp-frontend
    build:
      context: frontend
    restart: always
    depends_on:
      - postgrest

volumes:
  pg_data:
