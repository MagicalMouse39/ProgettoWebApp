@if (!router.url.endsWith('/login')) {
<header class="navbar">
  <div class="navbar-inner">
    <div class="logo">
      <span class="logo-icon">🐴</span>
      <span class="logo-text">HorseCare</span>
    </div>
    
    <nav class="nav-links desktop-only">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/horses" routerLinkActive="active">I Miei Cavalli</a>
      <a routerLink="/calendar" routerLinkActive="active">Calendario</a>
    </nav>

    <div class="user-profile">
      <div class="avatar" (click)="toggleDropdown()">U</div>
      
      <!-- Profile Dropdown -->
      @if (isDropdownOpen) {
        <div class="dropdown-menu">
          <div class="dropdown-header">Mio Account</div>
          <button class="dropdown-item" (click)="logout()">
            <span class="item-icon">🚪</span> Esci
          </button>
        </div>
        <!-- Overlay to close dropdown when clicking outside -->
        <div class="dropdown-overlay" (click)="toggleDropdown()"></div>
      }
    </div>
  </div>
</header>
}

<main class="page-content">
  <div class="container">
    <router-outlet></router-outlet>
  </div>
</main>

@if (!router.url.endsWith('/login')) {
<nav class="mobile-nav mobile-only">
  <a routerLink="/dashboard" routerLinkActive="active">
    <span class="nav-icon">📊</span>
    <span class="nav-text">Home</span>
  </a>
  <a routerLink="/horses" routerLinkActive="active">
    <span class="nav-icon">🐎</span>
    <span class="nav-text">Cavalli</span>
  </a>
  <a routerLink="/calendar" routerLinkActive="active">
    <span class="nav-icon">📅</span>
    <span class="nav-text">Agenda</span>
  </a>
  <a href="javascript:void(0)" (click)="logout()">
    <span class="nav-icon">🚪</span>
    <span class="nav-text">Esci</span>
  </a>
</nav>
}
